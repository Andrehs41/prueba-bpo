services:
  mysql:
    image: mysql:8.0
    container_name: bpo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: multitenant
      MYSQL_USER: bpo_user
      MYSQL_PASSWORD: bpo_pass
    ports:
      - "3307:3306"
    volumes:
      # Init script runs automatically on first container start (empty data dir).
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - bpo_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bpo_mysql_data:
